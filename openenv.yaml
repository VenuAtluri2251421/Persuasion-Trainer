spec_version: 1
name: persuasion_trainer
display_name: Multimodal Persuasion Trainer
description: >
  A high-fidelity, multimodal negotiation training environment powered by
  Llama 4 Scout (text + vision), Groq Whisper (voice STT), and PyTorch
  online policy gradients. The RL-driven AI opponent adapts its strategy
  (logical, emotional, data, examples, pressure) based on the agent's
  graded performance across clarity, logic, persuasion, and confidence.
type: space
runtime: fastapi
app: server.app:app
port: 8000
tasks:
  - name: refund-negotiation
    type: easy
    description: Convince a Customer Support Agent to issue a full refund for a delayed order.
  - name: job-offer-negotiation
    type: easy
    description: Negotiate a better compensation package with a startup recruiter.
  - name: salary-raise-negotiation
    type: medium
    description: Negotiate a 15% salary raise with a budget-constrained HR Manager.
  - name: landlord-rent-dispute
    type: medium
    description: Persuade a landlord to reduce rent or cover urgent repair costs.
  - name: board-pivot-negotiation
    type: hard
    description: Persuade a hostile Board Member to approve a full company pivot.
  - name: merger-acquisition-negotiation
    type: hard
    description: Convince a rival CEO to accept your acquisition terms during high-stakes M&A talks.
reward:
  min: 0.0
  max: 1.0
  formula: "weighted mean of (clarity + logic + persuasion + confidence) / 40.0, penalised by filler-word hesitation rate and modulated by Llama Vision facial expression signals (confidence, eye_contact, nervousness)"
tags:
  - openenv
  - negotiation
  - multimodal
  - reinforcement-learning
  - llama-4
  - pytorch
  - groq-whisper
